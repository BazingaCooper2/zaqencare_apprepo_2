name: nurse_tracking_app
description: ZaqenCare - Hospital nurse tracking application with GPS and scheduling

publish_to: 'none'

version: 1.9.3+10  # ← UPDATED

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.0.0
  http: ^1.1.0
  web_socket_channel: ^2.4.0

  # Location & Maps
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  flutter_polyline_points: ^2.0.0
  google_maps_flutter: ^2.10.0
  permission_handler: ^11.3.0

  # UI & Utils
  intl: ^0.19.0
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  flutter_local_notifications: ^17.2.1
  fl_chart: ^0.66.1
  provider: ^6.1.1
  flutter_staggered_animations: ^1.1.1
  url_launcher: ^6.2.3
  shared_preferences: ^2.2.3
  signature: ^5.4.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.9.0

  # Email
  mailer: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0   # ← ADDED FOR SPLASH

flutter:
  uses-material-design: true

  assets:
    - assets/final_logo.jpeg
    - assets/final_logo.jpeg   # ← ADDED

flutter_icons:
  android: true
  ios: true
  image_path: "assets/final_logo.jpeg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/final_logo.jpeg"

flutter_native_splash:
  color: "#ffffff"
  image: assets/final_logo.jpeg
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: scaleAspectFit
  fullscreen: true